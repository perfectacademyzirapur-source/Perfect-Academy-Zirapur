<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel - Perfect Academy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
background:linear-gradient(135deg,#1e3a8a,#2563eb);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* LOGIN BOX */
.login-box{
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:20px;
backdrop-filter:blur(15px);
width:300px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3)
}

.login-box h2{margin-bottom:20px}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px
}

button{
padding:10px;
width:100%;
border:none;
background:#3b82f6;
color:white;
border-radius:8px;
cursor:pointer;
}

/* DASHBOARD */
.dashboard{
display:none;
width:90%;
max-width:1000px;
}

.top-bar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:20px;
backdrop-filter:blur(10px);
margin-bottom:20px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.2);
}

.logout{
background:red;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
<h2>Admin Login</h2>
<input type="password" id="pass" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<div class="top-bar">
<h2>📊 Admin Dashboard</h2>
<div class="logout" onclick="logout()">Logout</div>
</div>

<div class="card">
<h3>Total Leads: <span id="count">0</span></h3>
</div>

<div class="card">
<h3>Student Leads</h3>
<table>
<thead>
<tr><th>Name</th><th>Phone</th><th>Action</th></tr>
</thead>
<tbody id="tableData"></tbody>
</table>
</div>

</div>

<script>

// DEMO DATA (jab tak Firebase connect nahi)
let leads = [];

// LOGIN
function login(){
let pass=document.getElementById("pass").value;

if(pass==="admin123"){
document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";
loadData();
}else{
alert("Wrong Password");
}
}

// LOGOUT
function logout(){
location.reload();
}

// LOAD DATA
function loadData(){
let table="";
leads.forEach((lead,i)=>{
table+=`
<tr>
<td>${lead.name}</td>
<td>${lead.phone}</td>
<td><button onclick="deleteLead(${i})">Delete</button></td>
</tr>`;
});

document.getElementById("tableData").innerHTML=table;
document.getElementById("count").innerText=leads.length;
}

// DELETE
function deleteLead(index){
leads.splice(index,1);
loadData();
}

</script>

</body>
</html>
