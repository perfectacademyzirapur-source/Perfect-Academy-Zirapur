<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfect Academy Zirapur</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:#0f172a;color:white}

/* HEADER */
header{
position:fixed;width:100%;top:0;
display:flex;justify-content:space-between;
padding:20px;background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px)
}
nav a{margin:0 10px;color:white;text-decoration:none}
.btn{background:#3b82f6;padding:10px 15px;border-radius:8px}

/* HERO */
.hero{
height:100vh;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
text-align:center;
background:linear-gradient(135deg,#1e3a8a,#2563eb)
}
.hero h1{font-size:50px}
.hero p{margin:10px 0}

/* COURSES */
.courses{
padding:80px 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px
}
.card{
background:rgba(255,255,255,0.1);
padding:20px;border-radius:20px;
backdrop-filter:blur(15px);
transition:0.3s
}
.card:hover{transform:translateY(-10px)}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;padding:20px
}
.gallery img{
width:100%;border-radius:10px;
transition:0.3s
}
.gallery img:hover{transform:scale(1.05)}

/* CONTACT */
.contact{
padding:50px;text-align:center
}
input,textarea{
width:80%;padding:10px;margin:5px;border-radius:5px;border:none
}

/* FLOAT BUTTONS */
.whatsapp,.instagram{
position:fixed;right:20px;padding:15px;border-radius:50%;
color:white;font-size:20px
}
.whatsapp{bottom:20px;background:#25D366}
.instagram{bottom:80px;background:linear-gradient(45deg,#f09433,#dc2743)}

/* FOOTER */
footer{text-align:center;padding:20px;background:#020617}

</style>
</head>

<body>

<header>
<h2>Perfect Academy</h2>
<nav>
<a href="#">Home</a>
<a href="#courses">Courses</a>
<a href="#contact">Contact</a>
</nav>
<a href="#contact" class="btn">Join Now</a>
</header>

<section class="hero">
<h1>Perfect Academy Zirapur</h1>
<p>Best Computer Institute for Your Bright Future</p>
<a href="#contact" class="btn">Start Now</a>
</section>

<section id="courses" class="courses">
<div class="card" data-aos="fade-up">DCA - ₹11,000</div>
<div class="card" data-aos="fade-up">PGDCA - ₹12,000</div>
<div class="card" data-aos="fade-up">CPCT - ₹9,000</div>
<div class="card" data-aos="fade-up">Basic - ₹1500</div>
<div class="card" data-aos="fade-up">AI Class - ₹3000</div>
</section>

<section class="gallery">
<img src="https://images.unsplash.com/photo-1581091870627-3c1f7d36b3d3">
<img src="https://images.unsplash.com/photo-1571260899304-425eee4c7efc">
<img src="https://images.unsplash.com/photo-1584697964403-5a5a0c8b0e6e">
<img src="https://images.unsplash.com/photo-1588072432836-e10032774350">
</section>

<section id="contact" class="contact">
<h2>Contact Us</h2>
<form onsubmit="sendData(); return false;">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="msg" placeholder="Message"></textarea>
<button>Submit</button>
</form>
</section>

<a href="https://wa.me/917415146049" class="whatsapp">W</a>
<a href="https://instagram.com/perfectacademy1978" class="instagram">I</a>

<footer>
<p>© 2026 Perfect Academy Zirapur</p>
</footer>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init();

function sendData(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
window.open("https://wa.me/917415146049?text=Name:"+name+" Phone:"+phone);
}
</script>

</body>
</html>
